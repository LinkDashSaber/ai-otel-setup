apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ai-otel-setup-poc.fullname" . }}
  labels:
    {{- include "ai-otel-setup-poc.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.job.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "ai-otel-setup-poc.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: smoke
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - node
            - /app/scripts/poc-smoke.js
          env:
            - name: HOME
              value: /tmp/ai-otel-home
            - name: AI_OTEL_POC_ENDPOINT
              value: {{ .Values.smoke.endpoint | quote }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
