name: Delivery POC

on:
  workflow_dispatch:
  pull_request:
    paths:
      - Dockerfile
      - scripts/poc-smoke.js
      - chart/**
      - .github/workflows/delivery-poc.yml
      - cli.js
      - package.json
      - templates/**
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - scripts/poc-smoke.js
      - chart/**
      - .github/workflows/delivery-poc.yml
      - cli.js
      - package.json
      - templates/**

jobs:
  kind-delivery-poc:
    name: Build image and validate Helm delivery on Kind
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_TAG: ${{ github.sha }}
      CHART_PATH: chart/ai-otel-setup-poc
      RELEASE_NAME: ai-otel-setup-poc
      NAMESPACE: ai-delivery-poc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image metadata
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/ai-otel-setup" >> "$GITHUB_ENV"
          echo "CHART_OCI_REPOSITORY=oci://ghcr.io/${GITHUB_REPOSITORY,,}/charts" >> "$GITHUB_ENV"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: delivery-poc

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build local image for Kind
        run: docker build -t ai-otel-setup:${IMAGE_TAG} .

      - name: Run container smoke test
        run: |
          docker run --rm \
            --entrypoint node \
            -e HOME=/tmp/ai-otel-home \
            -e AI_OTEL_POC_ENDPOINT=http://127.0.0.1:4318 \
            ai-otel-setup:${IMAGE_TAG} \
            /app/scripts/poc-smoke.js

      - name: Load image into Kind
        run: kind load docker-image ai-otel-setup:${IMAGE_TAG} --name delivery-poc

      - name: Helm lint
        run: helm lint "${CHART_PATH}"

      - name: Helm template
        run: |
          helm template "${RELEASE_NAME}" "${CHART_PATH}" \
            --namespace "${NAMESPACE}" \
            --set image.repository=ai-otel-setup \
            --set image.tag="${IMAGE_TAG}" \
            --set image.pullPolicy=IfNotPresent

      - name: Install chart on Kind
        run: |
          kubectl create namespace "${NAMESPACE}"
          helm upgrade --install "${RELEASE_NAME}" "${CHART_PATH}" \
            --namespace "${NAMESPACE}" \
            --set image.repository=ai-otel-setup \
            --set image.tag="${IMAGE_TAG}" \
            --set image.pullPolicy=IfNotPresent

      - name: Wait for smoke job
        run: |
          kubectl wait \
            --namespace "${NAMESPACE}" \
            --for=condition=complete \
            "job/${RELEASE_NAME}" \
            --timeout=180s

      - name: Collect smoke logs
        if: always()
        run: |
          kubectl logs \
            --namespace "${NAMESPACE}" \
            "job/${RELEASE_NAME}" \
            | tee delivery-poc.log

      - name: Publish image to GHCR
        if: github.event_name != 'pull_request'
        run: |
          docker tag ai-otel-setup:${IMAGE_TAG} "${IMAGE_NAME}:${IMAGE_TAG}"
          docker tag ai-otel-setup:${IMAGE_TAG} "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${IMAGE_TAG}"
          docker push "${IMAGE_NAME}:latest"

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package "${CHART_PATH}" --destination dist

      - name: Publish Helm chart to GHCR
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin
          helm push dist/*.tgz "${CHART_OCI_REPOSITORY}"

      - name: Publish delivery summary
        if: always()
        run: |
          {
            echo "## Delivery POC"
            echo
            echo "- Repository: \`${{ github.repository }}\`"
            echo "- Image tag: \`${IMAGE_TAG}\`"
            echo "- Chart: \`${CHART_PATH}\`"
            echo "- Chart OCI repository: \`${CHART_OCI_REPOSITORY:-not-published-on-pr}\`"
            echo "- Namespace: \`${NAMESPACE}\`"
            echo
            echo "### Smoke logs"
            echo
            echo '```text'
            if [ -f delivery-poc.log ]; then
              sed -n '1,160p' delivery-poc.log
            else
              echo "delivery-poc.log was not created"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
